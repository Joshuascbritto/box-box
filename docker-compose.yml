services:
  postgres:
    image: postgres:16-alpine
    container_name: box-box-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boxbox
      POSTGRES_USER: boxbox
      POSTGRES_PASSWORD: boxbox
    ports:
      - "5432:5432"
    volumes:
      - box-box-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxbox -d boxbox"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  box-box-pgdata:
